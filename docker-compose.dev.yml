name: chatbotx

include:
  - docker-compose.yml

x-service-common: &service-common
  platform: linux/amd64
  restart: unless-stopped
  env_file:
    - ./.env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - chatbotx-network

x-worker-common: &worker-common
  <<: *service-common
  build:
    context: .
    dockerfile: apps/worker/docker/Dockerfile

services:
  builder:
    <<: *service-common
    build:
      context: .
      dockerfile: apps/builder/docker/Dockerfile
    ports:
      - "3123:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      filesystem:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - RUN_DB_MIGRATE=true
      - RUN_DB_SEED=true

  # BullMQ Worker
  worker:
    <<: *worker-common
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      filesystem:
        condition: service_healthy

  realtime:
    <<: *service-common
    build:
      context: .
      dockerfile: apps/realtime/docker/Dockerfile
    ports:
      - "1999:1999"
